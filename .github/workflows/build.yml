name: Build AltoClef

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :1.21.1:build
        env:
          JAVA_HOME: ''

      - name: Find built jar
        id: findjar
        run: |
          JAR=$(find versions/1.21.1/build/libs -name "*.jar" ! -name "*-sources.jar" ! -name "*-dev.jar" | head -1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT
          echo "Found jar: $JAR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: altoclef-mod
          path: ${{ steps.findjar.outputs.jar_path }}
          if-no-files-found: error
